<!DOCTYPE html>
<html>
<head>
    <title>Sistemi i Biletave</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 30px; }
        .karta { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #007bff; }
        .cmimi { color: #28a745; font-size: 24px; font-weight: bold; }
        .badge { background: #007bff; color: white; padding: 5px 10px; border-radius: 5px; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Paneli i Shitjeve - <span class="badge">{{ roli }}</span></h1>
    {% for b in biletat %}
    <div class="karta">
        <h2>✈️ {{ b.itinerari }}</h2>
        <p>Vende të lira: <strong>{{ b.stoku }}</strong></p>
        <div class="cmimi">{{ b.cmimi + shtesa }} EUR</div>
        <button style="margin-top:10px; padding:10px; cursor:pointer; background:#007bff; color:white; border:none; border-radius:5px;">Rezervo Tani</button>
    </div>
    {% endfor %}
</body>
</html>
